name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      # Chrome build + zip
      - name: Build Chrome
        run: npm run build

      - name: Package Chrome
        run: cd dist/chrome-mv3 && zip -r ../../blue-badge-remover-chrome-${{ github.ref_name }}.zip .

      # Firefox build + zip
      - name: Build Firefox
        run: npm run build:firefox

      - name: Package Firefox
        run: cd dist/firefox-mv2 && zip -r ../../blue-badge-remover-firefox-${{ github.ref_name }}.zip .

      # GitHub Release with both zips
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            blue-badge-remover-chrome-${{ github.ref_name }}.zip
            blue-badge-remover-firefox-${{ github.ref_name }}.zip
          generate_release_notes: true
