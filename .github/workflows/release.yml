name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      # Chrome
      - name: Build Chrome
        run: npm run build

      - name: Package Chrome
        run: cd dist/chrome-mv3 && zip -r ../../blue-badge-remover-chrome-${{ github.ref_name }}.zip .

      # Firefox
      - name: Build Firefox
        run: npm run build:firefox

      - name: Package Firefox
        run: cd dist/firefox-mv2 && zip -r ../../blue-badge-remover-firefox-${{ github.ref_name }}.zip .

      # Edge
      - name: Build Edge
        run: npm run build:edge

      - name: Package Edge
        run: cd dist/edge-mv3 && zip -r ../../blue-badge-remover-edge-${{ github.ref_name }}.zip .

      # GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            blue-badge-remover-chrome-${{ github.ref_name }}.zip
            blue-badge-remover-firefox-${{ github.ref_name }}.zip
            blue-badge-remover-edge-${{ github.ref_name }}.zip
          generate_release_notes: true

      # Store submission (각 스토어 API 키가 secrets에 등록된 경우에만 실행)
      - name: Submit to Chrome Web Store
        if: env.CHROME_EXTENSION_ID != ''
        continue-on-error: true
        run: npx wxt submit --chrome-zip blue-badge-remover-chrome-${{ github.ref_name }}.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Firefox AMO
        if: env.FIREFOX_JWT_ISSUER != ''
        continue-on-error: true
        run: npx wxt submit --firefox-zip blue-badge-remover-firefox-${{ github.ref_name }}.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Submit to Edge Add-ons
        if: env.EDGE_PRODUCT_ID != ''
        continue-on-error: true
        run: npx wxt submit --edge-zip blue-badge-remover-edge-${{ github.ref_name }}.zip
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_CLIENT_SECRET: ${{ secrets.EDGE_CLIENT_SECRET }}
          EDGE_ACCESS_TOKEN_URL: ${{ secrets.EDGE_ACCESS_TOKEN_URL }}
