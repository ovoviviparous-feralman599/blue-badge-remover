name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      # Chrome
      - name: Build Chrome
        run: npm run build

      - name: Package Chrome
        run: cd dist/chrome-mv3 && zip -r "../../blue-badge-remover-chrome-${TAG_NAME}.zip" .

      # Firefox
      - name: Build Firefox
        run: npm run build:firefox

      - name: Package Firefox
        run: cd dist/firefox-mv2 && zip -r "../../blue-badge-remover-firefox-${TAG_NAME}.zip" .

      # Edge
      - name: Build Edge
        run: npm run build:edge

      - name: Package Edge
        run: cd dist/edge-mv3 && zip -r "../../blue-badge-remover-edge-${TAG_NAME}.zip" .

      # GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            blue-badge-remover-chrome-${{ env.TAG_NAME }}.zip
            blue-badge-remover-firefox-${{ env.TAG_NAME }}.zip
            blue-badge-remover-edge-${{ env.TAG_NAME }}.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-test') }}

      # Store submission (테스트 릴리스(-test 접미사)는 스토어 제출 건너뜀)
      - name: Submit to Chrome Web Store
        if: env.CHROME_EXTENSION_ID != '' && !contains(github.ref_name, '-test')
        continue-on-error: true
        run: npx wxt submit --chrome-zip "blue-badge-remover-chrome-${TAG_NAME}.zip"
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Firefox AMO
        if: env.FIREFOX_JWT_ISSUER != '' && !contains(github.ref_name, '-test')
        continue-on-error: true
        run: npx wxt submit --firefox-zip "blue-badge-remover-firefox-${TAG_NAME}.zip"
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Submit to Edge Add-ons
        if: env.EDGE_PRODUCT_ID != '' && !contains(github.ref_name, '-test')
        continue-on-error: true
        run: npx wxt submit --edge-zip "blue-badge-remover-edge-${TAG_NAME}.zip"
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_CLIENT_SECRET: ${{ secrets.EDGE_CLIENT_SECRET }}
          EDGE_ACCESS_TOKEN_URL: ${{ secrets.EDGE_ACCESS_TOKEN_URL }}
