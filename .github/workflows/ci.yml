name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Chrome
        run: npm run build

      - name: Build Firefox
        run: npm run build:firefox

      - name: Upload Chrome build
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3
          path: dist/chrome-mv3/

      - name: Upload Firefox build
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: firefox-mv2
          path: dist/firefox-mv2/

  e2e:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Build Chrome
        run: npm run build

      - name: Run E2E
        run: xvfb-run npx playwright test

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/
